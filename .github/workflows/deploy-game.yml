name: Deploy Space War Game to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'game.html'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare game directory
        run: |
          mkdir -p /tmp/game-dist
          cp game.html /tmp/game-dist/index.html
          cp game.html /tmp/game-dist/game.html

      - name: Deploy game to gh-pages branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: gh-pages
          build_dir: /tmp/game-dist
          jekyll: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
