<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beat My Contribution Record 🚀 — Space War</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d1117;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      font-family: 'Courier New', Courier, monospace;
      color: #00D9FF;
      padding: 20px 10px 30px;
    }

    h1 {
      font-size: clamp(1.2rem, 3vw, 1.8rem);
      text-align: center;
      text-shadow: 0 0 20px #00D9FF;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: clamp(0.75rem, 2vw, 0.95rem);
      color: #FFD700;
      text-align: center;
      margin-bottom: 14px;
      text-shadow: 0 0 10px #FFD70088;
    }

    #gameCanvas {
      border: 2px solid #00D9FF;
      box-shadow: 0 0 30px #00D9FF44, 0 0 60px #00D9FF22;
      display: block;
      max-width: 100%;
    }

    .controls {
      margin-top: 10px;
      font-size: clamp(0.65rem, 1.8vw, 0.8rem);
      color: #666;
      text-align: center;
      letter-spacing: 0.04em;
    }

    .controls span { color: #00D9FF; }

    .back-link {
      display: inline-block;
      margin-top: 16px;
      color: #00D9FF;
      text-decoration: none;
      font-size: 0.85rem;
      border: 1px solid #00D9FF44;
      padding: 6px 16px;
      border-radius: 4px;
      transition: background 0.2s;
    }
    .back-link:hover { background: #00D9FF22; }
  </style>
</head>
<body>

  <h1>🚀 Beat My Contribution Record</h1>
  <p class="subtitle">Shoot the contribution stars — can you beat Jacques' GitHub record?</p>

  <canvas id="gameCanvas" width="700" height="500"></canvas>

  <p class="controls">
    <span>← →</span> or <span>A D</span> to move &nbsp;|&nbsp;
    <span>SPACE</span> to shoot &nbsp;|&nbsp;
    Click canvas to start
  </p>

  <a class="back-link" href="https://github.com/JacquesUwonda">← Back to Profile</a>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const W = canvas.width;
    const H = canvas.height;

    // Jacques' GitHub contribution record — the target to beat!
    const RECORD = 1000;

    let gameState = 'start'; // 'start' | 'playing' | 'won' | 'lost'
    let score = 0;
    let lives = 3;
    let level = 1;
    let frame = 0;
    let lastShot = 0;
    let spawnCounter = 0;

    const player = { x: W / 2, y: H - 55, w: 44, h: 34, speed: 5 };

    let bullets = [];
    let contribStars = [];   // falling contribution stars (enemies)
    let bgStars = [];        // decorative background stars
    let particles = [];      // explosion particles
    let floatingTexts = [];  // score pop-ups

    const keys = {};

    // ── Background stars ──────────────────────────────────────────────────────
    function initBgStars() {
      for (let i = 0; i < 110; i++) {
        bgStars.push({
          x: Math.random() * W,
          y: Math.random() * H,
          r: Math.random() * 1.4 + 0.2,
          alpha: Math.random() * 0.7 + 0.3,
          speed: Math.random() * 0.25 + 0.05,
          twinkleOffset: Math.random() * Math.PI * 2,
        });
      }
    }

    // ── Star shape drawing ────────────────────────────────────────────────────
    function drawStarShape(x, y, size, rotation, color, alpha) {
      ctx.save();
      ctx.globalAlpha = alpha ?? 1;
      ctx.translate(x, y);
      ctx.rotate(rotation);
      ctx.fillStyle = color;
      ctx.shadowColor = color;
      ctx.shadowBlur = 10;
      ctx.beginPath();
      for (let i = 0; i < 5; i++) {
        const outerA = (i * 4 * Math.PI) / 5 - Math.PI / 2;
        const innerA = ((i * 4 + 2) * Math.PI) / 5 - Math.PI / 2;
        const ox = Math.cos(outerA) * size;
        const oy = Math.sin(outerA) * size;
        const ix = Math.cos(innerA) * size * 0.42;
        const iy = Math.sin(innerA) * size * 0.42;
        if (i === 0) ctx.moveTo(ox, oy); else ctx.lineTo(ox, oy);
        ctx.lineTo(ix, iy);
      }
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    const STAR_COLORS = ['#FFD700', '#FFA500', '#FF6B6B', '#00C853', '#00D9FF', '#C86DD7', '#FF85A1'];

    function spawnContribStar() {
      const size = Math.random() * 13 + 7;
      contribStars.push({
        x: Math.random() * (W - 60) + 30,
        y: -size * 2,
        size,
        speed: (0.8 + Math.random() * 0.8) + (level - 1) * 0.15,
        rotation: 0,
        rotSpeed: (Math.random() - 0.5) * 0.06,
        color: STAR_COLORS[Math.floor(Math.random() * STAR_COLORS.length)],
        points: Math.max(1, Math.floor(size / 4)),
      });
    }

    // ── Player spaceship ──────────────────────────────────────────────────────
    function drawPlayer() {
      ctx.save();
      ctx.translate(player.x, player.y);

      // Engine exhaust glow
      const exhaustSize = 5 + Math.sin(frame * 0.4) * 3;
      const grad = ctx.createRadialGradient(0, player.h / 2 + 4, 0, 0, player.h / 2 + 4, exhaustSize * 2.5);
      grad.addColorStop(0, '#FF6B35');
      grad.addColorStop(1, 'transparent');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.ellipse(0, player.h / 2 + 4, exhaustSize, exhaustSize * 1.6, 0, 0, Math.PI * 2);
      ctx.fill();

      // Ship body
      ctx.fillStyle = '#00D9FF';
      ctx.shadowColor = '#00D9FF';
      ctx.shadowBlur = 16;
      ctx.beginPath();
      ctx.moveTo(0, -player.h / 2);          // nose
      ctx.lineTo(player.w / 2, player.h / 2); // right wing tip
      ctx.lineTo(player.w / 4, player.h / 4); // right wing notch
      ctx.lineTo(-player.w / 4, player.h / 4);// left wing notch
      ctx.lineTo(-player.w / 2, player.h / 2);// left wing tip
      ctx.closePath();
      ctx.fill();

      // Cockpit window
      ctx.fillStyle = '#001f3f';
      ctx.shadowBlur = 0;
      ctx.beginPath();
      ctx.ellipse(0, -2, 5, 7, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#7FDBFF';
      ctx.lineWidth = 1;
      ctx.stroke();

      ctx.restore();
    }

    // ── Bullet ────────────────────────────────────────────────────────────────
    function drawBullet(b) {
      ctx.save();
      ctx.fillStyle = '#FFD700';
      ctx.shadowColor = '#FFD700';
      ctx.shadowBlur = 12;
      ctx.beginPath();
      ctx.ellipse(b.x, b.y, 3, 9, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    // ── Explosion particles ───────────────────────────────────────────────────
    function explode(x, y, color) {
      for (let i = 0; i < 14; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 3.5 + 0.8;
        particles.push({
          x, y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: 1,
          color,
          r: Math.random() * 3 + 1,
        });
      }
    }

    // ── Floating score text ───────────────────────────────────────────────────
    function addFloatingText(x, y, text, color) {
      floatingTexts.push({ x, y, text, color, life: 1 });
    }

    // ── HUD ───────────────────────────────────────────────────────────────────
    function drawHUD() {
      // Score
      ctx.save();
      ctx.font = 'bold 15px Courier New';
      ctx.fillStyle = '#00D9FF';
      ctx.shadowColor = '#00D9FF';
      ctx.shadowBlur = 6;
      ctx.textAlign = 'left';
      ctx.fillText(`Score: ${score}`, 12, 24);
      ctx.fillText(`Record: ${RECORD}`, 12, 44);

      // Progress bar
      const pct = Math.min(score / RECORD, 1);
      const barW = 180;
      ctx.fillStyle = '#1a1a2e';
      ctx.shadowBlur = 0;
      ctx.fillRect(12, 52, barW, 10);
      const barColor = pct >= 1 ? '#00C853' : pct > 0.6 ? '#FFD700' : '#00D9FF';
      ctx.fillStyle = barColor;
      ctx.fillRect(12, 52, barW * pct, 10);
      ctx.strokeStyle = '#00D9FF44';
      ctx.lineWidth = 1;
      ctx.strokeRect(12, 52, barW, 10);

      // Level
      ctx.textAlign = 'center';
      ctx.fillStyle = '#FFD700';
      ctx.shadowColor = '#FFD700';
      ctx.shadowBlur = 8;
      ctx.font = 'bold 14px Courier New';
      ctx.fillText(`Level ${level}`, W / 2, 24);

      // Lives (red stars)
      for (let i = 0; i < lives; i++) {
        drawStarShape(W - 20 - i * 26, 22, 9, 0, '#FF6B6B', 1);
      }

      ctx.restore();
    }

    // ── Overlay screens ───────────────────────────────────────────────────────
    function drawOverlay(alpha) {
      ctx.save();
      ctx.fillStyle = `rgba(13,17,23,${alpha})`;
      ctx.fillRect(0, 0, W, H);
      ctx.restore();
    }

    function drawStartScreen() {
      drawOverlay(0.82);
      ctx.save();
      ctx.textAlign = 'center';

      ctx.font = 'bold 36px Courier New';
      ctx.fillStyle = '#00D9FF';
      ctx.shadowColor = '#00D9FF';
      ctx.shadowBlur = 24;
      ctx.fillText('🚀  SPACE  WAR', W / 2, H / 2 - 90);

      ctx.font = 'bold 18px Courier New';
      ctx.fillStyle = '#FFD700';
      ctx.shadowColor = '#FFD700';
      ctx.shadowBlur = 14;
      ctx.fillText('Beat My Contribution Record!', W / 2, H / 2 - 50);

      ctx.font = '14px Courier New';
      ctx.fillStyle = '#aaa';
      ctx.shadowBlur = 0;
      ctx.fillText(`🌟 Shoot ${RECORD} contribution stars to win`, W / 2, H / 2 - 10);
      ctx.fillText('← →  /  A D   Move      SPACE   Shoot', W / 2, H / 2 + 18);
      ctx.fillText('Don\'t let stars reach the bottom — you have 3 lives!', W / 2, H / 2 + 42);

      ctx.font = 'bold 20px Courier New';
      ctx.fillStyle = '#00C853';
      ctx.shadowColor = '#00C853';
      ctx.shadowBlur = 18;
      ctx.fillText('[ PRESS SPACE  or  CLICK TO START ]', W / 2, H / 2 + 85);
      ctx.restore();
    }

    function drawWinScreen() {
      drawOverlay(0.88);
      ctx.save();
      ctx.textAlign = 'center';

      ctx.font = 'bold 38px Courier New';
      ctx.fillStyle = '#FFD700';
      ctx.shadowColor = '#FFD700';
      ctx.shadowBlur = 28;
      ctx.fillText('🏆  YOU BEAT THE RECORD!', W / 2, H / 2 - 70);

      ctx.font = '20px Courier New';
      ctx.fillStyle = '#00D9FF';
      ctx.shadowColor = '#00D9FF';
      ctx.shadowBlur = 10;
      ctx.fillText(`Your Score: ${score}  >  Jacques' Record: ${RECORD}`, W / 2, H / 2 - 20);

      ctx.font = '15px Courier New';
      ctx.fillStyle = '#ccc';
      ctx.shadowBlur = 0;
      ctx.fillText('Incredible! You\'re a true space warrior 🚀', W / 2, H / 2 + 16);

      ctx.font = 'bold 18px Courier New';
      ctx.fillStyle = '#00C853';
      ctx.shadowColor = '#00C853';
      ctx.shadowBlur = 14;
      ctx.fillText('[ PRESS SPACE  or  CLICK TO PLAY AGAIN ]', W / 2, H / 2 + 65);
      ctx.restore();
    }

    function drawLoseScreen() {
      drawOverlay(0.88);
      ctx.save();
      ctx.textAlign = 'center';

      ctx.font = 'bold 38px Courier New';
      ctx.fillStyle = '#FF6B6B';
      ctx.shadowColor = '#FF6B6B';
      ctx.shadowBlur = 28;
      ctx.fillText('💀  GAME OVER', W / 2, H / 2 - 70);

      ctx.font = '20px Courier New';
      ctx.fillStyle = '#00D9FF';
      ctx.shadowColor = '#00D9FF';
      ctx.shadowBlur = 10;
      ctx.fillText(`Score: ${score} / ${RECORD}`, W / 2, H / 2 - 20);

      ctx.font = '15px Courier New';
      ctx.fillStyle = '#FFD700';
      ctx.shadowBlur = 0;
      ctx.fillText('The contribution stars reached Earth! Try again 💪', W / 2, H / 2 + 16);

      ctx.font = 'bold 18px Courier New';
      ctx.fillStyle = '#00C853';
      ctx.shadowColor = '#00C853';
      ctx.shadowBlur = 14;
      ctx.fillText('[ PRESS SPACE  or  CLICK TO TRY AGAIN ]', W / 2, H / 2 + 65);
      ctx.restore();
    }

    // ── Reset / Init ──────────────────────────────────────────────────────────
    function resetGame() {
      score = 0;
      lives = 3;
      level = 1;
      frame = 0;
      lastShot = 0;
      spawnCounter = 0;
      bullets = [];
      contribStars = [];
      particles = [];
      floatingTexts = [];
      player.x = W / 2;
      player.y = H - 55;
      gameState = 'playing';
    }

    // ── Update ────────────────────────────────────────────────────────────────
    function update() {
      frame++;

      // Scroll background stars
      bgStars.forEach(s => {
        s.y += s.speed;
        if (s.y > H) s.y = -2;
        s.alpha = 0.35 + Math.abs(Math.sin(frame * 0.025 + s.twinkleOffset)) * 0.65;
      });

      if (gameState !== 'playing') return;

      // Player movement
      const moveL = keys['ArrowLeft'] || keys['a'] || keys['A'];
      const moveR = keys['ArrowRight'] || keys['d'] || keys['D'];
      if (moveL && player.x - player.w / 2 > 0) player.x -= player.speed;
      if (moveR && player.x + player.w / 2 < W) player.x += player.speed;

      // Shoot
      if (keys[' '] && frame - lastShot > 10) {
        bullets.push({ x: player.x, y: player.y - player.h / 2, speed: 11 });
        lastShot = frame;
      }

      // Bullets move up
      for (let i = bullets.length - 1; i >= 0; i--) {
        bullets[i].y -= bullets[i].speed;
        if (bullets[i].y < -12) bullets.splice(i, 1);
      }

      // Star spawning — speed increases with level
      const spawnInterval = Math.max(18, 55 - level * 4);
      spawnCounter++;
      if (spawnCounter >= spawnInterval) {
        spawnCounter = 0;
        spawnContribStar();
        if (level >= 4) spawnContribStar();  // double spawn at higher levels
        if (level >= 8) spawnContribStar();  // triple spawn at max level
      }

      // Level progression
      const newLevel = Math.floor(score / 80) + 1;
      if (newLevel > level) level = Math.min(newLevel, 10);

      // Move contribution stars + collision detection
      for (let i = contribStars.length - 1; i >= 0; i--) {
        const s = contribStars[i];
        s.y += s.speed;
        s.rotation += s.rotSpeed;

        // Star escaped — lose a life
        if (s.y > H + s.size * 2) {
          contribStars.splice(i, 1);
          lives--;
          if (lives <= 0) { gameState = 'lost'; return; }
          continue;
        }

        // Check bullet collisions
        let hit = false;
        for (let j = bullets.length - 1; j >= 0; j--) {
          const b = bullets[j];
          const dx = b.x - s.x;
          const dy = b.y - s.y;
          if (Math.sqrt(dx * dx + dy * dy) < s.size + 2) {
            explode(s.x, s.y, s.color);
            addFloatingText(s.x, s.y, `+${s.points}`, s.color);
            score += s.points;
            contribStars.splice(i, 1);
            bullets.splice(j, 1);
            if (score >= RECORD) { gameState = 'won'; return; }
            hit = true;
            break;
          }
        }
        if (hit) continue;
      }

      // Update particles
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.06; // gentle gravity
        p.life -= 0.035;
        if (p.life <= 0) particles.splice(i, 1);
      }

      // Update floating texts
      for (let i = floatingTexts.length - 1; i >= 0; i--) {
        const t = floatingTexts[i];
        t.y -= 1.2;
        t.life -= 0.04;
        if (t.life <= 0) floatingTexts.splice(i, 1);
      }
    }

    // ── Render ────────────────────────────────────────────────────────────────
    function render() {
      ctx.fillStyle = '#0d1117';
      ctx.fillRect(0, 0, W, H);

      // Background stars
      bgStars.forEach(s => {
        ctx.save();
        ctx.globalAlpha = s.alpha;
        ctx.fillStyle = '#ffffff';
        ctx.shadowColor = '#ffffff';
        ctx.shadowBlur = 3;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      });

      if (gameState === 'playing' || gameState === 'won' || gameState === 'lost') {
        // Bullets
        bullets.forEach(drawBullet);

        // Contribution stars
        contribStars.forEach(s => drawStarShape(s.x, s.y, s.size, s.rotation, s.color, 1));

        // Particles
        particles.forEach(p => {
          ctx.save();
          ctx.globalAlpha = p.life;
          ctx.fillStyle = p.color;
          ctx.shadowColor = p.color;
          ctx.shadowBlur = 6;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        });

        // Floating score texts
        floatingTexts.forEach(t => {
          ctx.save();
          ctx.globalAlpha = t.life;
          ctx.font = 'bold 13px Courier New';
          ctx.fillStyle = t.color;
          ctx.shadowColor = t.color;
          ctx.shadowBlur = 8;
          ctx.textAlign = 'center';
          ctx.fillText(t.text, t.x, t.y);
          ctx.restore();
        });

        // Player (hide on game-over screens)
        if (gameState === 'playing') drawPlayer();

        drawHUD();
      }

      // Overlay screens
      if (gameState === 'start') drawStartScreen();
      else if (gameState === 'won')  drawWinScreen();
      else if (gameState === 'lost') drawLoseScreen();
    }

    // ── Main loop ─────────────────────────────────────────────────────────────
    function loop() {
      update();
      render();
      requestAnimationFrame(loop);
    }

    // ── Input ─────────────────────────────────────────────────────────────────
    document.addEventListener('keydown', e => {
      keys[e.key] = true;
      if (e.key === ' ') {
        e.preventDefault();
        if (gameState !== 'playing') resetGame();
      }
    });
    document.addEventListener('keyup', e => { keys[e.key] = false; });
    canvas.addEventListener('click', () => {
      if (gameState !== 'playing') resetGame();
    });

    // ── Boot ──────────────────────────────────────────────────────────────────
    initBgStars();
    loop();
  </script>
</body>
</html>
